<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>i5s Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
top:-250px;
left:-250px;
width:600px;
height:600px;
background:rgba(255,0,0,.12);
filter:blur(120px);
z-index:-1;
}

body::after{
content:'';
position:fixed;
bottom:-250px;
right:-250px;
width:600px;
height:600px;
background:rgba(255,0,0,.12);
filter:blur(120px);
z-index:-1;
}

.hidden{
display:none !important;
}

.login-screen{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:430px;
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:30px;
padding:40px;
box-shadow:0 0 40px rgba(255,0,0,.15);
}

.logo{
font-size:62px;
font-weight:900;
color:#ff2d2d;
margin-bottom:10px;
}

.login-sub{
color:#777;
margin-bottom:25px;
}

input{
width:100%;
height:58px;
background:#111;
border:1px solid #222;
border-radius:14px;
padding:0 18px;
color:white;
font-size:16px;
outline:none;
margin-bottom:15px;
}

button{
border:none;
cursor:pointer;
}

.login-btn,
.register-btn,
.buy-btn,
.topup-btn,
.approve-btn,
.reject-btn{
border-radius:14px;
font-weight:800;
color:white;
}

.login-btn{
width:100%;
height:58px;
background:#ff2d2d;
margin-bottom:12px;
}

.register-btn{
width:100%;
height:58px;
background:#151515;
}

.navbar{
height:80px;
background:#080808;
border-bottom:1px solid #1f1f1f;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
}

.nav-logo{
font-size:38px;
font-weight:900;
color:#ff2d2d;
}

.nav-right{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.nav-btn{
height:45px;
padding:0 20px;
background:#111;
border:1px solid #222;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:700;
}

.nav-btn:hover{
background:#ff2d2d;
}

.balance{
height:45px;
padding:0 20px;
display:flex;
align-items:center;
background:#111;
border:1px solid #222;
border-radius:12px;
font-weight:800;
}

.page{
display:none;
padding:30px;
}

.active-page{
display:block;
}

.section-title{
font-size:50px;
font-weight:900;
margin-bottom:30px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product-card{
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:24px;
padding:28px;
}

.product-card h2{
font-size:40px;
margin-bottom:12px;
}

.price{
font-size:46px;
font-weight:900;
color:#ff2d2d;
margin-bottom:20px;
}

.buy-btn{
width:100%;
height:55px;
background:#ff2d2d;
}

.inventory-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.inventory-item{
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:20px;
padding:25px;
}

.inventory-item h3{
font-size:28px;
margin-bottom:10px;
}

.topup-box{
max-width:950px;
margin:auto;
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:30px;
padding:35px;
}

.crypto-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.crypto-card{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:22px;
cursor:pointer;
text-align:center;
transition:.2s;
}

.crypto-card.active{
border-color:#00ff80;
background:#102018;
}

.crypto-card h3{
font-size:24px;
margin-bottom:5px;
}

.quick-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-bottom:20px;
}

.quick-grid button{
height:50px;
background:#111;
border:1px solid #222;
border-radius:12px;
color:white;
font-weight:700;
}

.quick-grid button:hover{
background:#ff2d2d;
}

.topup-btn{
width:100%;
height:58px;
background:#0f7f3c;
font-size:16px;
}

.request-box{
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:22px;
padding:25px;
margin-bottom:20px;
}

.request-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.request-buttons{
display:flex;
gap:10px;
}

.approve-btn{
background:#16a34a;
height:48px;
padding:0 20px;
}

.reject-btn{
background:#ff2d2d;
height:48px;
padding:0 20px;
}

@media(max-width:700px){

.quick-grid{
grid-template-columns:repeat(2,1fr);
}

.section-title{
font-size:38px;
}

}

</style>
</head>

<body>

<div id="loginPage" class="login-screen">

<div class="login-box">

<div class="logo">i5s</div>

<div class="login-sub">
Secure Digital Store Login
</div>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button class="login-btn" onclick="login()">
Login
</button>

<button class="register-btn" onclick="register()">
Create Account
</button>

</div>

</div>

<div id="mainSite" class="hidden">

<div class="navbar">

<div class="nav-logo">
i5s
</div>

<div class="nav-right">

<div class="balance">
Balance: $
<span id="balance">0</span>
</div>

<button class="nav-btn" onclick="showPage('shop')">
Shop
</button>

<button class="nav-btn" onclick="showPage('inventory')">
Inventory
</button>

<button class="nav-btn" onclick="showPage('topup')">
Top Up
</button>

<button id="adminButton"
class="nav-btn hidden"
onclick="showPage('admin')">
Admin
</button>

<button class="nav-btn" onclick="logout()">
Logout
</button>

</div>

</div>

<div id="shop" class="page active-page">

<h1 class="section-title">
Products
</h1>

<div class="product-grid">

<div class="product-card">
<h2>1D</h2>
<div class="price">$10</div>
<button class="buy-btn"
onclick="buyProduct(10,'1D Access')">
Purchase
</button>
</div>

<div class="product-card">
<h2>3D</h2>
<div class="price">$25</div>
<button class="buy-btn"
onclick="buyProduct(25,'3D Access')">
Purchase
</button>
</div>

<div class="product-card">
<h2>5D</h2>
<div class="price">$40</div>
<button class="buy-btn"
onclick="buyProduct(40,'5D Access')">
Purchase
</button>
</div>

<div class="product-card">
<h2>7D</h2>
<div class="price">$60</div>
<button class="buy-btn"
onclick="buyProduct(60,'7D Access')">
Purchase
</button>
</div>

<div class="product-card">
<h2>10D</h2>
<div class="price">$85</div>
<button class="buy-btn"
onclick="buyProduct(85,'10D Access')">
Purchase
</button>
</div>

<div class="product-card">
<h2>Permanent</h2>
<div class="price">$150</div>
<button class="buy-btn"
onclick="buyProduct(150,'Permanent Access')">
Purchase
</button>
</div>

</div>

</div>

<div id="inventory" class="page">

<h1 class="section-title">
Inventory
</h1>

<div id="inventoryGrid"
class="inventory-grid"></div>

</div>

<div id="topup" class="page">

<div class="topup-box">

<h1 class="section-title">
Top Up Balance
</h1>

<div class="crypto-grid">

<div class="crypto-card active">
<h3>BTC</h3>
<p>Bitcoin</p>
</div>

<div class="crypto-card">
<h3>LTC</h3>
<p>Litecoin</p>
</div>

<div class="crypto-card">
<h3>USDT</h3>
<p>Tether</p>
</div>

<div class="crypto-card">
<h3>SOL</h3>
<p>Solana</p>
</div>

</div>

<input type="number"
id="topupAmount"
placeholder="Enter Amount">

<div class="quick-grid">

<button onclick="setAmount(10)">
$10
</button>

<button onclick="setAmount(25)">
$25
</button>

<button onclick="setAmount(50)">
$50
</button>

<button onclick="setAmount(100)">
$100
</button>

<button onclick="setAmount(250)">
$250
</button>

<button onclick="setAmount(500)">
$500
</button>

</div>

<button class="topup-btn"
onclick="createRequest()">
Create Payment Request
</button>

</div>

</div>

<div id="admin" class="page">

<h1 class="section-title">
Admin Requests
</h1>

<div id="requestContainer"></div>

</div>

</div>

<script>

const ADMIN_USERNAME = "woojun";
const ADMIN_PASSWORD = "F1AX65DvCA45X";

let users =
JSON.parse(localStorage.getItem("users")) || [];

let requests =
JSON.parse(localStorage.getItem("requests")) || [];

let currentUser =
JSON.parse(localStorage.getItem("currentUser")) || null;

// 관리자 생성
if(!users.find(u => u.username === ADMIN_USERNAME)){

users.push({
username:ADMIN_USERNAME,
password:ADMIN_PASSWORD,
balance:999999,
inventory:[]
});

localStorage.setItem(
"users",
JSON.stringify(users)
);

}

// 자동 로그인
window.onload = function(){

users =
JSON.parse(localStorage.getItem("users")) || [];

requests =
JSON.parse(localStorage.getItem("requests")) || [];

currentUser =
JSON.parse(localStorage.getItem("currentUser")) || null;

if(currentUser){

showMain();

}

};

// 실시간 동기화
window.addEventListener("storage", function(){

requests =
JSON.parse(localStorage.getItem("requests")) || [];

users =
JSON.parse(localStorage.getItem("users")) || [];

if(currentUser){

const updatedUser =
users.find(u => u.username === currentUser.username);

if(updatedUser){

currentUser = updatedUser;

updateBalance();

}

}

renderRequests();

});

// 회원가입
function register(){

users =
JSON.parse(localStorage.getItem("users")) || [];

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

if(username === "" || password === ""){

alert("Fill all fields");
return;

}

const exists =
users.find(
u =>
u.username.toLowerCase() ===
username.toLowerCase()
);

if(exists){

alert("Username already exists");
return;

}

users.push({

username:username,
password:password,
balance:0,
inventory:[]

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert("Account Created Successfully");

document.getElementById("username").value = "";
document.getElementById("password").value = "";

}

// 로그인
function login(){

users =
JSON.parse(localStorage.getItem("users")) || [];

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

const foundUser =
users.find(
u =>
u.username === username &&
u.password === password
);

if(!foundUser){

alert("Invalid Account");
return;

}

currentUser = foundUser;

localStorage.setItem(
"currentUser",
JSON.stringify(currentUser)
);

showMain();

}

// 메인 표시
function showMain(){

document.getElementById("loginPage")
.classList.add("hidden");

document.getElementById("mainSite")
.classList.remove("hidden");

updateBalance();

renderInventory();

renderRequests();

if(currentUser.username === ADMIN_USERNAME){

document.getElementById("adminButton")
.classList.remove("hidden");

}

}

// 로그아웃
function logout(){

localStorage.removeItem("currentUser");

location.reload();

}

// 잔액 업데이트
function updateBalance(){

document.getElementById("balance").innerText =
currentUser.balance;

}

// 유저 저장
function saveUsers(){

users = users.map(u => {

if(u.username === currentUser.username){

return currentUser;

}

return u;

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

localStorage.setItem(
"currentUser",
JSON.stringify(currentUser)
);

}

// 페이지 이동
function showPage(page){

document.querySelectorAll(".page")
.forEach(p => {

p.classList.remove("active-page");

});

document.getElementById(page)
.classList.add("active-page");

if(page === "admin"){

renderRequests();

}

}

// 상품 구매
function buyProduct(price,name){

if(currentUser.balance < price){

alert("Not enough balance");
return;

}

currentUser.balance -= price;

currentUser.inventory.push(name);

saveUsers();

updateBalance();

renderInventory();

alert(name + " Purchased");

}

// 인벤토리 표시
function renderInventory(){

const grid =
document.getElementById("inventoryGrid");

grid.innerHTML = "";

if(currentUser.inventory.length === 0){

grid.innerHTML = `
<div class="inventory-item">
<h3>Empty</h3>
<p>No items purchased yet.</p>
</div>
`;

return;

}

currentUser.inventory.forEach(item => {

grid.innerHTML += `
<div class="inventory-item">
<h3>${item}</h3>
<p>Purchased Successfully</p>
</div>
`;

});

}

// 코인 선택
document.querySelectorAll(".crypto-card")
.forEach(card => {

card.addEventListener("click", function(){

document.querySelectorAll(".crypto-card")
.forEach(c => {

c.classList.remove("active");

});

card.classList.add("active");

});

});

// 금액 버튼
function setAmount(amount){

document.getElementById("topupAmount").value =
amount;

}

// 충전 요청 생성
function createRequest(){

requests =
JSON.parse(localStorage.getItem("requests")) || [];

const amount =
document.getElementById("topupAmount").value;

if(amount === "" || Number(amount) <= 0){

alert("Enter valid amount");
return;

}

const selectedCrypto =
document.querySelector(".crypto-card.active h3")
.innerText;

requests.push({

id:Date.now(),

user:currentUser.username,

amount:Number(amount),

crypto:selectedCrypto,

status:"Pending",

created:new Date().toLocaleString()

});

localStorage.setItem(
"requests",
JSON.stringify(requests)
);

alert("Payment Request Created");

document.getElementById("topupAmount").value = "";

renderRequests();

}

// 관리자 패널 표시
function renderRequests(){

requests =
JSON.parse(localStorage.getItem("requests")) || [];

const container =
document.getElementById("requestContainer");

if(!container){

return;

}

container.innerHTML = "";

// 최신순 정렬
requests.sort((a,b)=>b.id-a.id);

if(requests.length === 0){

container.innerHTML = `
<div class="request-box">
<h2>No Requests</h2>
<p>No payment requests found.</p>
</div>
`;

return;

}

requests.forEach(req => {

container.innerHTML += `

<div class="request-box">

<div class="request-top">

<div>

<h2>$${req.amount}</h2>

<p><b>User:</b> ${req.user}</p>

<p><b>Crypto:</b> ${req.crypto}</p>

<p><b>Status:</b> ${req.status}</p>

<p>${req.created}</p>

</div>

<div class="request-buttons">

<button
class="approve-btn"
onclick="approveRequest(${req.id})">

Approve

</button>

<button
class="reject-btn"
onclick="rejectRequest(${req.id})">

Reject

</button>

</div>

</div>

</div>

`;

});

}

// 승인
function approveRequest(id){

requests =
JSON.parse(localStorage.getItem("requests")) || [];

users =
JSON.parse(localStorage.getItem("users")) || [];

const req =
requests.find(r => r.id === id);

if(!req){

alert("Request Not Found");
return;

}

const targetUser =
users.find(u => u.username === req.user);

if(!targetUser){

alert("User Not Found");
return;

}

// 잔액 추가
targetUser.balance += Number(req.amount);

// users 저장
localStorage.setItem(
"users",
JSON.stringify(users)
);

// 현재 로그인 유저 업데이트
if(currentUser.username === targetUser.username){

currentUser = targetUser;

localStorage.setItem(
"currentUser",
JSON.stringify(currentUser)
);

updateBalance();

}

// 요청 삭제
requests =
requests.filter(r => r.id !== id);

localStorage.setItem(
"requests",
JSON.stringify(requests)
);

renderRequests();

alert("Approved Successfully");

}

// 거절
function rejectRequest(id){

requests =
JSON.parse(localStorage.getItem("requests")) || [];

requests =
requests.filter(r => r.id !== id);

localStorage.setItem(
"requests",
JSON.stringify(requests)
);

renderRequests();

alert("Rejected");

}

</script>

</body>
</html>
