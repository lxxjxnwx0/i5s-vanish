<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i5s</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
}

/* LOGIN */

.auth-page{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#00ff9920,transparent 40%),
    #050505;
}

.auth-box{
    width:390px;
    background:#0b0b0b;
    border:1px solid #1a1a1a;
    border-radius:26px;
    padding:40px 30px;
    box-shadow:0 0 40px rgba(0,255,153,.08);
}

.logo{
    text-align:center;
    font-size:74px;
    font-weight:900;
    color:#00ff99;
    margin-bottom:35px;
}

.input{
    width:100%;
    height:55px;
    background:#0f0f0f;
    border:1px solid #1f1f1f;
    border-radius:14px;
    padding:0 16px;
    color:white;
    font-size:15px;
    outline:none;
    margin-bottom:15px;
}

.input:focus{
    border:1px solid #00ff99;
}

.btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:17px;
    font-weight:800;
    transition:.2s;
}

.login-btn{
    background:#00ff99;
    color:black;
}

.login-btn:hover{
    transform:translateY(-2px);
    opacity:.95;
}

.small-register{
    text-align:center;
    margin-top:18px;
    color:#999;
    font-size:13px;
}

.small-register span{
    color:#00ff99;
    cursor:pointer;
}

/* PANEL */

.panel{
    display:none;
}

.topbar{
    width:100%;
    height:85px;
    border-bottom:1px solid #111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    background:#070707;
}

.top-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.top-right{
    display:flex;
    align-items:center;
    gap:16px;
}

.brand{
    font-size:60px;
    font-weight:900;
    color:#00ff99;
}

.balance-box{
    background:linear-gradient(135deg,#0a0a0a,#111);
    border:1px solid #00ff99;
    padding:12px 22px;
    border-radius:18px;
    min-width:170px;
    box-shadow:0 0 20px rgba(0,255,153,.12);
}

.balance-title{
    color:#888;
    font-size:12px;
}

.balance-money{
    margin-top:4px;
    font-size:24px;
    font-weight:900;
    color:#00ff99;
}

.topup-box{
    display:flex;
    align-items:center;
    gap:10px;
    background:#0c0c0c;
    border:1px solid #1d1d1d;
    border-radius:16px;
    padding:8px;
}

.topup-input{
    width:110px;
    height:42px;
    background:#090909;
    border:1px solid #1f1f1f;
    border-radius:10px;
    color:white;
    padding:0 12px;
    outline:none;
}

.topup-btn{
    height:42px;
    padding:0 18px;
    border:none;
    border-radius:10px;
    background:#00ff99;
    color:black;
    font-weight:800;
    cursor:pointer;
}

.user{
    display:flex;
    align-items:center;
    gap:12px;
    background:#0f0f0f;
    padding:10px 16px;
    border-radius:16px;
    border:1px solid #1b1b1b;
}

.user img{
    width:38px;
    height:38px;
    border-radius:50%;
}

.user-name{
    font-weight:700;
}

.user-rank{
    color:#00ff99;
    font-size:12px;
    margin-top:2px;
}

/* MAIN */

.main{
    padding:35px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
}

.card{
    background:
    linear-gradient(180deg,#0a0a0a,#070707);
    border:1px solid #00ff99;
    border-radius:24px;
    padding:28px;
    height:240px;
    position:relative;
    overflow:hidden;
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 30px rgba(0,255,153,.12);
}

.card::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    background:#00ff9910;
    border-radius:50%;
    top:-80px;
    right:-80px;
}

.card-title{
    font-size:56px;
    font-weight:900;
    position:relative;
    z-index:2;
}

.card-price{
    position:absolute;
    top:28px;
    right:28px;
    font-size:42px;
    font-weight:900;
    color:#00ff99;
    z-index:2;
}

.buy-btn{
    position:absolute;
    left:28px;
    right:28px;
    bottom:28px;
    height:58px;
    border:none;
    border-radius:16px;
    background:#00ff99;
    color:black;
    font-weight:900;
    font-size:17px;
    cursor:pointer;
    transition:.2s;
}

.buy-btn:hover{
    transform:scale(1.02);
}

/* ADMIN */

.admin-panel{
    margin-top:35px;
    background:#0b0b0b;
    border:1px solid #1d1d1d;
    border-radius:24px;
    padding:28px;
}

.admin-title{
    font-size:24px;
    font-weight:800;
    color:#00ff99;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:15px;
}

.admin-btn{
    width:180px;
    background:#00ff99;
    color:black;
    font-weight:900;
}

.hidden{
    display:none;
}

@media(max-width:1000px){

.grid{
    grid-template-columns:1fr;
}

.topbar{
    flex-direction:column;
    height:auto;
    padding:20px;
    gap:20px;
}

.top-right{
    width:100%;
    flex-direction:column;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="auth-page" id="authPage">

    <div class="auth-box">

        <div class="logo">i5s</div>

        <!-- LOGIN -->

        <div id="loginBox">

            <input class="input"
            id="loginUser"
            placeholder="Username">

            <input class="input"
            id="loginPass"
            type="password"
            placeholder="Password">

            <button class="btn login-btn" onclick="login()">
                Login
            </button>

            <div class="small-register">
                Don't have an account?
                <span onclick="showRegister()">
                    Sign Up
                </span>
            </div>

        </div>

        <!-- REGISTER -->

        <div id="registerBox" class="hidden">

            <input class="input"
            id="regUser"
            placeholder="Create Username">

            <input class="input"
            id="regPass"
            type="password"
            placeholder="Create Password">

            <button class="btn login-btn" onclick="register()">
                Sign Up
            </button>

            <div class="small-register">
                Already have an account?
                <span onclick="showLogin()">
                    Login
                </span>
            </div>

        </div>

    </div>

</div>

<!-- PANEL -->

<div class="panel" id="panel">

    <div class="topbar">

        <div class="top-left">

            <div class="brand">i5s</div>

            <div class="balance-box">

                <div class="balance-title">
                    Balance
                </div>

                <div class="balance-money">
                    $<span id="balance">0</span>
                </div>

            </div>

        </div>

        <div class="top-right">

            <!-- TOPUP -->

            <div class="topup-box">

                <input
                type="number"
                id="topupAmount"
                class="topup-input"
                placeholder="$">

                <button
                class="topup-btn"
                onclick="topup()">
                    Add
                </button>

            </div>

            <!-- USER -->

            <div class="user">

                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

                <div>

                    <div class="user-name"
                    id="usernameView">
                        User
                    </div>

                    <div class="user-rank"
                    id="rankView">
                        MEMBER
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="grid">

            <div class="card">

                <div class="card-title">
                    1d
                </div>

                <div class="card-price">
                    $35
                </div>

                <button
                class="buy-btn"
                onclick="buy(35,'1d')">
                    Purchase
                </button>

            </div>

            <div class="card">

                <div class="card-title">
                    3d
                </div>

                <div class="card-price">
                    $20
                </div>

                <button
                class="buy-btn"
                onclick="buy(20,'3d')">
                    Purchase
                </button>

            </div>

            <div class="card">

                <div class="card-title">
                    5d
                </div>

                <div class="card-price">
                    $15
                </div>

                <button
                class="buy-btn"
                onclick="buy(15,'5d')">
                    Purchase
                </button>

            </div>

        </div>

        <!-- ADMIN PANEL -->

        <div class="admin-panel hidden"
        id="adminPanel">

            <div class="admin-title">
                Admin Balance Control
            </div>

            <div class="row">

                <input
                class="input"
                id="targetUser"
                placeholder="Target Username">

                <input
                class="input"
                id="amountAdd"
                placeholder="Amount">

                <button
                class="btn admin-btn"
                onclick="adminAddBalance()">
                    Add Balance
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const ADMIN_KEY = "F1AX65DvCA45X"

let users =
JSON.parse(localStorage.getItem("users")) || {}

function showRegister(){

    document
    .getElementById("loginBox")
    .classList
    .add("hidden")

    document
    .getElementById("registerBox")
    .classList
    .remove("hidden")

}

function showLogin(){

    document
    .getElementById("registerBox")
    .classList
    .add("hidden")

    document
    .getElementById("loginBox")
    .classList
    .remove("hidden")

}

function register(){

    const user =
    document.getElementById("regUser").value

    const pass =
    document.getElementById("regPass").value

    if(!user || !pass){

        alert("Fill all fields")
        return
    }

    if(users[user]){

        alert("Username already exists")
        return
    }

    users[user] = {
        password: pass,
        balance: 0,
        role: "MEMBER"
    }

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    alert("Account created")

    showLogin()

}

function login(){

    const user =
    document.getElementById("loginUser").value

    const pass =
    document.getElementById("loginPass").value

    if(!users[user]){

        alert("User not found")
        return
    }

    if(users[user].password !== pass){

        alert("Wrong password")
        return
    }

    startSession(user)

}

function startSession(user){

    localStorage.setItem(
        "currentUser",
        user
    )

    document
    .getElementById("authPage")
    .style.display = "none"

    document
    .getElementById("panel")
    .style.display = "block"

    document
    .getElementById("usernameView")
    .innerText = user

    updateBalance()

    if(user === ADMIN_KEY){

        document
        .getElementById("rankView")
        .innerText = "ADMIN"

        document
        .getElementById("adminPanel")
        .classList
        .remove("hidden")

    }

}

function updateBalance(){

    const current =
    localStorage.getItem("currentUser")

    document
    .getElementById("balance")
    .innerText =
    users[current].balance

}

function topup(){

    const current =
    localStorage.getItem("currentUser")

    const amount =
    Number(
        document
        .getElementById("topupAmount")
        .value
    )

    if(amount <= 0){

        alert("Invalid amount")
        return
    }

    users[current].balance += amount

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    updateBalance()

    document
    .getElementById("topupAmount")
    .value = ""

}

function buy(price,name){

    const current =
    localStorage.getItem("currentUser")

    if(users[current].balance < price){

        alert("Not enough balance")
        return
    }

    users[current].balance -= price

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    updateBalance()

    alert(name + " purchased")

}

function adminAddBalance(){

    const target =
    document.getElementById("targetUser").value

    const amount =
    Number(
        document.getElementById("amountAdd").value
    )

    if(!users[target]){

        alert("User not found")
        return
    }

    users[target].balance += amount

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    alert("Balance added")

}

window.onload = () => {

    const current =
    localStorage.getItem("currentUser")

    if(current && users[current]){

        startSession(current)

    }

}

</script>

</body>
</html>
