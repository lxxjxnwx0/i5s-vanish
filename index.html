<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i5s</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
}

/* LOGIN */

.auth-page{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.auth-box{
    width:380px;
    background:#0b0b0b;
    border:1px solid #151515;
    border-radius:20px;
    padding:40px 30px;
}

.logo{
    text-align:center;
    font-size:72px;
    font-weight:900;
    color:#00ff99;
    margin-bottom:35px;
}

.input{
    width:100%;
    height:55px;
    background:#0f0f0f;
    border:1px solid #1f1f1f;
    border-radius:14px;
    padding:0 16px;
    color:white;
    font-size:15px;
    outline:none;
    margin-bottom:15px;
}

.btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:17px;
    font-weight:700;
    transition:.2s;
}

.login-btn{
    background:#00ff99;
    color:black;
    margin-top:5px;
}

.login-btn:hover{
    opacity:.9;
}

.small-register{
    text-align:center;
    margin-top:18px;
    color:#999;
    font-size:13px;
}

.small-register span{
    color:#00ff99;
    cursor:pointer;
}

/* PANEL */

.panel{
    display:none;
}

.topbar{
    width:100%;
    height:75px;
    border-bottom:1px solid #131313;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 35px;
}

.top-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.brand{
    font-size:52px;
    font-weight:900;
    color:#00ff99;
}

.balance-box{
    background:#0f0f0f;
    border:1px solid #1f1f1f;
    padding:10px 18px;
    border-radius:12px;
    font-size:14px;
    color:#00ff99;
}

.user{
    display:flex;
    align-items:center;
    gap:10px;
    background:#0f0f0f;
    padding:10px 16px;
    border-radius:12px;
    border:1px solid #1b1b1b;
}

.user img{
    width:34px;
    height:34px;
    border-radius:50%;
}

.main{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:#0a0a0a;
    border:1px solid #00ff99;
    border-radius:18px;
    padding:25px;
    min-height:200px;
    position:relative;
}

.card-title{
    font-size:42px;
    font-weight:900;
}

.card-price{
    position:absolute;
    top:25px;
    right:25px;
    font-size:34px;
    font-weight:900;
    color:#00ff99;
}

.buy-btn{
    position:absolute;
    bottom:25px;
    left:25px;
    right:25px;
    height:50px;
    border:none;
    border-radius:12px;
    background:#00ff99;
    color:black;
    font-weight:800;
    cursor:pointer;
    font-size:16px;
}

.buy-btn:hover{
    opacity:.9;
}

/* ADMIN */

.admin-panel{
    margin-top:35px;
    background:#0b0b0b;
    border:1px solid #1a1a1a;
    border-radius:18px;
    padding:25px;
}

.admin-title{
    font-size:22px;
    margin-bottom:20px;
    color:#00ff99;
}

.row{
    display:flex;
    gap:12px;
}

.admin-btn{
    width:180px;
    background:#00ff99;
    color:black;
    font-weight:800;
}

.hidden{
    display:none;
}

@media(max-width:900px){

.grid{
    grid-template-columns:1fr;
}

.brand{
    font-size:40px;
}

.topbar{
    flex-direction:column;
    height:auto;
    padding:20px;
    gap:15px;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="auth-page" id="authPage">

    <div class="auth-box">

        <div class="logo">i5s</div>

        <!-- LOGIN FORM -->

        <div id="loginBox">

            <input class="input" id="loginUser" placeholder="Username">

            <input class="input"
            id="loginPass"
            type="password"
            placeholder="Password">

            <button class="btn login-btn" onclick="login()">
                Login
            </button>

            <div class="small-register">
                Don't have an account?
                <span onclick="showRegister()">
                    Sign Up
                </span>
            </div>

        </div>

        <!-- REGISTER FORM -->

        <div id="registerBox" class="hidden">

            <input class="input"
            id="regUser"
            placeholder="Create Username">

            <input class="input"
            id="regPass"
            type="password"
            placeholder="Create Password">

            <button class="btn login-btn" onclick="register()">
                Sign Up
            </button>

            <div class="small-register">
                Already have an account?
                <span onclick="showLogin()">
                    Login
                </span>
            </div>

        </div>

    </div>

</div>

<!-- PANEL -->

<div class="panel" id="panel">

    <div class="topbar">

        <div class="top-left">

            <div class="brand">i5s</div>

            <div class="balance-box">
                Balance :
                $<span id="balance">0</span>
            </div>

        </div>

        <div class="user">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <span id="usernameView">User</span>
        </div>

    </div>

    <div class="main">

        <div class="grid">

            <div class="card">
                <div class="card-title">1d</div>
                <div class="card-price">$35</div>

                <button class="buy-btn" onclick="buy(35,'1d')">
                    Purchase
                </button>
            </div>

            <div class="card">
                <div class="card-title">3d</div>
                <div class="card-price">$20</div>

                <button class="buy-btn" onclick="buy(20,'3d')">
                    Purchase
                </button>
            </div>

            <div class="card">
                <div class="card-title">5d</div>
                <div class="card-price">$15</div>

                <button class="buy-btn" onclick="buy(15,'5d')">
                    Purchase
                </button>
            </div>

        </div>

        <!-- ADMIN PANEL -->

        <div class="admin-panel hidden" id="adminPanel">

            <div class="admin-title">
                Admin Balance Control
            </div>

            <div class="row">

                <input class="input"
                id="targetUser"
                placeholder="Target Username">

                <input class="input"
                id="amountAdd"
                placeholder="Amount">

                <button class="btn admin-btn"
                onclick="adminAddBalance()">
                    Add Money
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const ADMIN_KEY = "F1AX65DvCA45X"

let users =
JSON.parse(localStorage.getItem("users")) || {}

function showRegister(){

    document
    .getElementById("loginBox")
    .classList
    .add("hidden")

    document
    .getElementById("registerBox")
    .classList
    .remove("hidden")

}

function showLogin(){

    document
    .getElementById("registerBox")
    .classList
    .add("hidden")

    document
    .getElementById("loginBox")
    .classList
    .remove("hidden")

}

function register(){

    const user =
    document.getElementById("regUser").value

    const pass =
    document.getElementById("regPass").value

    if(!user || !pass){

        alert("Fill all fields")
        return
    }

    if(users[user]){

        alert("Username already exists")
        return
    }

    users[user] = {
        password: pass,
        balance: 0
    }

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    alert("Account created")

    showLogin()

}

function login(){

    const user =
    document.getElementById("loginUser").value

    const pass =
    document.getElementById("loginPass").value

    if(!users[user]){

        alert("User not found")
        return
    }

    if(users[user].password !== pass){

        alert("Wrong password")
        return
    }

    startSession(user)

}

function startSession(user){

    localStorage.setItem("currentUser", user)

    document.getElementById("authPage").style.display = "none"

    document.getElementById("panel").style.display = "block"

    document.getElementById("usernameView").innerText = user

    updateBalance()

    if(user === ADMIN_KEY){

        document
        .getElementById("adminPanel")
        .classList
        .remove("hidden")

    }

}

function updateBalance(){

    const current =
    localStorage.getItem("currentUser")

    document.getElementById("balance").innerText =
    users[current].balance

}

function buy(price,name){

    const current =
    localStorage.getItem("currentUser")

    if(users[current].balance < price){

        alert("Not enough balance")
        return
    }

    users[current].balance -= price

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    updateBalance()

    alert(name + " purchased")

}

function adminAddBalance(){

    const target =
    document.getElementById("targetUser").value

    const amount =
    Number(document.getElementById("amountAdd").value)

    if(!users[target]){

        alert("User not found")
        return
    }

    users[target].balance += amount

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    )

    alert("Balance added")

}

window.onload = () => {

    const current =
    localStorage.getItem("currentUser")

    if(current && users[current]){

        startSession(current)

    }

}

</script>

</body>
</html>
