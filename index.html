<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>i5s</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#050505;
      color:white;
    }

    /* LOGIN */

    .login-screen{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      gap:15px;
    }

    .logo{
      font-size:64px;
      font-weight:bold;
      color:#00ff99;
      margin-bottom:10px;
    }

    .login-screen input{
      width:320px;
      height:55px;
      background:#0d0d0d;
      border:1px solid #1d1d1d;
      border-radius:14px;
      padding:0 15px;
      color:white;
      font-size:15px;
    }

    .discord-btn{
      width:320px;
      height:55px;
      border:none;
      border-radius:14px;
      background:linear-gradient(90deg,#5865f2,#7289da);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .discord-btn:hover{
      transform:scale(1.02);
    }

    /* DASHBOARD */

    .dashboard{
      display:none;
    }

    nav{
      height:70px;
      border-bottom:1px solid #111;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 30px;
    }

    .nav-logo{
      font-size:44px;
      color:#00ff99;
      font-weight:bold;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .balance-box{
      background:#0d0d0d;
      border:1px solid #00ff99;
      border-radius:12px;
      padding:10px 16px;
      color:#00ff99;
      font-size:14px;
    }

    .user-box{
      background:#111;
      padding:10px 16px;
      border-radius:12px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .user-box img{
      width:32px;
      height:32px;
      border-radius:50%;
    }

    .container{
      padding:30px;
      display:grid;
      grid-template-columns:1fr 320px;
      gap:25px;
    }

    /* PLANS */

    .plans{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .plan{
      background:linear-gradient(180deg,#07120d,#050505);
      border:1px solid #00ff99;
      border-radius:24px;
      height:220px;
      padding:22px;
      cursor:pointer;
      transition:0.2s;

      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .plan:hover{
      transform:translateY(-4px);
      box-shadow:0 0 20px rgba(0,255,153,0.18);
    }

    .plan-title{
      font-size:38px;
      font-weight:bold;
    }

    .plan-price{
      font-size:30px;
      color:#00ff99;
      font-weight:bold;
    }

    /* SIDE */

    .side{
      background:#0c0c0c;
      border:1px solid #1d1d1d;
      border-radius:22px;
      padding:22px;
      height:fit-content;
    }

    .side-title{
      font-size:28px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .side input{
      width:100%;
      height:52px;
      background:black;
      border:1px solid #222;
      border-radius:12px;
      padding:0 15px;
      color:white;
      font-size:15px;
      margin-bottom:14px;
    }

    .total{
      margin:18px 0;
      font-size:22px;
      color:#00ff99;
      font-weight:bold;
    }

    .side button{
      width:100%;
      height:52px;
      border:none;
      border-radius:12px;
      background:#00ff99;
      color:black;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .side button:hover{
      opacity:0.9;
    }

    @media(max-width:1100px){

      .container{
        grid-template-columns:1fr;
      }

      .plans{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <!-- LOGIN -->

  <div class="login-screen" id="loginScreen">

    <div class="logo">i5s</div>

    <input type="text" id="registerUser" placeholder="Create Username">
    <input type="password" id="registerPass" placeholder="Create Password">

    <button class="discord-btn" onclick="register()">
      Create Account
    </button>

    <input type="text" id="loginUser" placeholder="Login Username">
    <input type="password" id="loginPass" placeholder="Login Password">

    <button class="discord-btn" onclick="login()">
      Continue with Discord
    </button>

  </div>

  <!-- DASHBOARD -->

  <div class="dashboard" id="dashboard">

    <nav>

      <div class="nav-logo">
        i5s
      </div>

      <div class="nav-right">

        <div class="balance-box">
          Balance:
          $<span id="balanceTop">0</span>
        </div>

        <div class="user-box">
          <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
          <span id="discordName">User</span>
        </div>

      </div>

    </nav>

    <div class="container">

      <!-- PLANS -->

      <div class="plans">

        <div class="plan" onclick="selectPlan(35)">
          <div class="plan-title">1d</div>
          <div class="plan-price">$35/h</div>
        </div>

        <div class="plan" onclick="selectPlan(20)">
          <div class="plan-title">3d</div>
          <div class="plan-price">$20/h</div>
        </div>

        <div class="plan" onclick="selectPlan(15)">
          <div class="plan-title">5d</div>
          <div class="plan-price">$15/h</div>
        </div>

      </div>

      <!-- SIDE -->

      <div class="side">

        <div class="side-title">
          Purchase
        </div>

        <input type="number" id="hours" min="1" value="1">

        <div class="total">
          Total:
          $<span id="total">35</span>
        </div>

        <button onclick="purchasePlan()">
          Purchase Now
        </button>

        <br><br>

        <div class="side-title" style="font-size:24px;">
          Admin Balance Add
        </div>

        <input type="text" id="targetUser" placeholder="Target Username">

        <input type="password" id="adminKey" placeholder="Admin Key">

        <input type="number" id="topupAmount" placeholder="Amount">

        <button onclick="addBalance()">
          Add Balance
        </button>

      </div>

    </div>

  </div>

  <script>

    let users = JSON.parse(localStorage.getItem("users")) || {};

    let currentUser = "";

    let selectedPrice = 35;

    let balance = 0;

    /* REGISTER */

    function register(){

      const user = document.getElementById("registerUser").value;
      const pass = document.getElementById("registerPass").value;

      if(!user || !pass){
        alert("Fill all fields");
        return;
      }

      if(users[user]){
        alert("User already exists");
        return;
      }

      users[user] = {
        password: pass,
        balance: 0
      };

      localStorage.setItem("users", JSON.stringify(users));

      alert("Account Created");

    }

    /* LOGIN */

    function login(){

      const user = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;

      if(!users[user]){
        alert("User not found");
        return;
      }

      if(users[user].password !== pass){
        alert("Wrong password");
        return;
      }

      currentUser = user;

      balance = users[user].balance;

      document.getElementById("discordName").innerText = user;

      updateBalance();

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

    }

    /* PLAN */

    function selectPlan(price){

      selectedPrice = price;

      updateTotal();

    }

    function updateTotal(){

      const hours = Number(document.getElementById("hours").value);

      document.getElementById("total").innerText =
        hours * selectedPrice;

    }

    document
      .getElementById("hours")
      .addEventListener("input", updateTotal);

    /* PURCHASE */

    function purchasePlan(){

      const total =
        Number(document.getElementById("total").innerText);

      if(balance < total){
        alert("Not enough balance");
        return;
      }

      balance -= total;

      users[currentUser].balance = balance;

      localStorage.setItem("users", JSON.stringify(users));

      updateBalance();

      alert("Purchase Complete");

    }

    /* ADMIN ADD BALANCE */

    function addBalance(){

      const adminKey =
        document.getElementById("adminKey").value;

      if(adminKey !== "F1AX65DvCA45X"){
        alert("Invalid Admin Key");
        return;
      }

      const target =
        document.getElementById("targetUser").value;

      const amount =
        Number(document.getElementById("topupAmount").value);

      if(!users[target]){
        alert("User not found");
        return;
      }

      if(amount <= 0){
        return;
      }

      users[target].balance += amount;

      localStorage.setItem("users", JSON.stringify(users));

      if(target === currentUser){

        balance = users[target].balance;

        updateBalance();

      }

      alert("Balance Added");

    }

    /* UPDATE BALANCE */

    function updateBalance(){

      document.getElementById("balanceTop").innerText =
        balance;

    }

  </script>

</body>
</html>
