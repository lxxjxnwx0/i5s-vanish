<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>i5s Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
}

header{
width:100%;
height:75px;
border-bottom:1px solid #131313;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#000;
}

.logo{
font-size:58px;
font-weight:900;
color:#00ff99;
}

.right-top{
display:flex;
align-items:center;
gap:14px;
}

.balance-box{
padding:12px 18px;
border:1px solid #1b1b1b;
border-radius:14px;
background:#0b0b0b;
color:#00ff99;
font-weight:700;
font-size:17px;
}

.topup-btn{
padding:12px 18px;
border:none;
border-radius:14px;
background:#00ff99;
color:#000;
font-weight:800;
cursor:pointer;
}

.logout-btn{
padding:12px 18px;
border:none;
border-radius:14px;
background:#151515;
color:white;
font-weight:700;
cursor:pointer;
}

.container{
padding:25px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
}

.card{
background:#070707;
border:2px solid #00ff99;
border-radius:24px;
padding:26px;
height:240px;
position:relative;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 0 25px #00ff4440;
}

.card h1{
font-size:55px;
}

.price{
position:absolute;
right:25px;
top:24px;
font-size:44px;
font-weight:900;
color:#00ff99;
}

.purchase{
position:absolute;
bottom:22px;
left:22px;
right:22px;
height:58px;
border:none;
border-radius:16px;
background:#00ff99;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.auth-screen{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.auth-box{
width:420px;
background:#070707;
border:1px solid #171717;
border-radius:24px;
padding:35px;
}

.auth-logo{
text-align:center;
font-size:78px;
font-weight:900;
color:#00ff99;
margin-bottom:20px;
}

.input{
width:100%;
height:58px;
background:#0b0b0b;
border:1px solid #1c1c1c;
border-radius:16px;
padding-left:18px;
font-size:17px;
color:white;
margin-bottom:14px;
outline:none;
}

.auth-btn{
width:100%;
height:58px;
border:none;
border-radius:16px;
background:#00ff99;
font-size:20px;
font-weight:900;
cursor:pointer;
margin-top:8px;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
color:#888;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
width:420px;
background:#080808;
border:1px solid #1d1d1d;
border-radius:22px;
padding:28px;
}

.popup-title{
font-size:32px;
font-weight:900;
margin-bottom:20px;
}

.admin-panel{
margin-top:30px;
padding-top:20px;
border-top:1px solid #181818;
}

.admin-title{
font-size:22px;
font-weight:900;
margin-bottom:15px;
color:#00ff99;
}

.request-box{
margin-top:18px;
padding:16px;
border-radius:16px;
background:#0a0a0a;
border:1px solid #1a1a1a;
}

.request-box h3{
margin-bottom:10px;
}

.request-item{
background:#111;
padding:12px;
border-radius:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.small-btn{
padding:10px 14px;
border:none;
border-radius:10px;
font-weight:800;
cursor:pointer;
background:#00ff99;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div id="authPage" class="auth-screen">

<div class="auth-box">

<div class="auth-logo">i5s</div>

<div id="loginForm">

<input id="loginUser" class="input" placeholder="Username">
<input id="loginPass" type="password" class="input" placeholder="Password">

<button class="auth-btn" onclick="login()">Login</button>

<div class="switch" onclick="showRegister()">
Create account
</div>

</div>

<div id="registerForm" class="hidden">

<input id="registerUser" class="input" placeholder="Create Username">
<input id="registerPass" type="password" class="input" placeholder="Create Password">

<button class="auth-btn" onclick="register()">
Create Account
</button>

<div class="switch" onclick="showLogin()">
Back to login
</div>

</div>

</div>

</div>

<div id="panelPage" class="hidden">

<header>

<div class="logo">i5s</div>

<div class="right-top">

<div class="balance-box">
Balance: $<span id="balance">0</span>
</div>

<button class="topup-btn" onclick="openTopup()">
Request Topup
</button>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

</header>

<div class="container">

<div class="card">
<h1>1d</h1>
<div class="price">$35</div>
<button class="purchase" onclick="buy(35)">
Purchase
</button>
</div>

<div class="card">
<h1>3d</h1>
<div class="price">$20</div>
<button class="purchase" onclick="buy(20)">
Purchase
</button>
</div>

<div class="card">
<h1>5d</h1>
<div class="price">$15</div>
<button class="purchase" onclick="buy(15)">
Purchase
</button>
</div>

</div>

<div id="adminPanel" class="admin-panel hidden">

<div class="admin-title">
ADMIN PANEL
</div>

<input id="targetUser" class="input" placeholder="Target Username">

<input id="addMoney" class="input" placeholder="Amount">

<button class="auth-btn" onclick="adminAddMoney()">
Add Balance
</button>

<div class="request-box">

<h3>Topup Requests</h3>

<div id="requests"></div>

</div>

</div>

</div>

<div class="popup" id="topupPopup">

<div class="popup-box">

<div class="popup-title">
Request Topup
</div>

<input id="topupAmount" class="input" placeholder="Enter Amount">

<button class="auth-btn" onclick="submitRequest()">
Send Request
</button>

</div>

</div>

<script>

const ADMIN_KEY = "F1AX65DvCA45X";

let currentUser = null;

function showRegister(){
document.getElementById("loginForm").classList.add("hidden");
document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin(){
document.getElementById("registerForm").classList.add("hidden");
document.getElementById("loginForm").classList.remove("hidden");
}

function register(){

const username = document.getElementById("registerUser").value;
const password = document.getElementById("registerPass").value;

if(!username || !password){
alert("Fill all fields");
return;
}

const users = JSON.parse(localStorage.getItem("users") || "{}");

if(users[username]){
alert("Username already exists");
return;
}

users[username] = {
password: password,
balance: 0,
admin: false
};

localStorage.setItem("users", JSON.stringify(users));

alert("Account created");

showLogin();
}

function login(){

const username = document.getElementById("loginUser").value;
const password = document.getElementById("loginPass").value;

const users = JSON.parse(localStorage.getItem("users") || "{}");

if(!users[username]){
alert("Account not found");
return;
}

if(users[username].password !== password){
alert("Wrong password");
return;
}

currentUser = username;

document.getElementById("authPage").classList.add("hidden");
document.getElementById("panelPage").classList.remove("hidden");

updateUI();

if(users[username].admin){
document.getElementById("adminPanel").classList.remove("hidden");
loadRequests();
}
}

function logout(){
location.reload();
}

function updateUI(){

const users = JSON.parse(localStorage.getItem("users") || "{}");

document.getElementById("balance").innerText =
users[currentUser].balance;
}

function buy(price){

const users = JSON.parse(localStorage.getItem("users") || "{}");

if(users[currentUser].balance < price){
alert("Not enough balance");
return;
}

users[currentUser].balance -= price;

localStorage.setItem("users", JSON.stringify(users));

updateUI();

alert("Purchased");
}

function openTopup(){
document.getElementById("topupPopup").style.display = "flex";
}

function submitRequest(){

const amount = document.getElementById("topupAmount").value;

if(!amount){
return;
}

const requests =
JSON.parse(localStorage.getItem("requests") || "[]");

requests.push({
user: currentUser,
amount: amount
});

localStorage.setItem("requests", JSON.stringify(requests));

alert("Topup request sent");

document.getElementById("topupPopup").style.display = "none";
}

function loadRequests(){

const requests =
JSON.parse(localStorage.getItem("requests") || "[]");

const div = document.getElementById("requests");

div.innerHTML = "";

requests.forEach((r,index)=>{

div.innerHTML += `
<div class="request-item">
<div>
${r.user} requested $${r.amount}
</div>

<button class="small-btn"
onclick="approveRequest(${index})">
Approve
</button>
</div>
`;

});
}

function approveRequest(index){

const requests =
JSON.parse(localStorage.getItem("requests") || "[]");

const users =
JSON.parse(localStorage.getItem("users") || "{}");

const req = requests[index];

users[req.user].balance += Number(req.amount);

localStorage.setItem("users", JSON.stringify(users));

requests.splice(index,1);

localStorage.setItem("requests", JSON.stringify(requests));

loadRequests();

alert("Balance added");
}

function adminAddMoney(){

const target =
document.getElementById("targetUser").value;

const amount =
document.getElementById("addMoney").value;

const users =
JSON.parse(localStorage.getItem("users") || "{}");

if(!users[target]){
alert("User not found");
return;
}

users[target].balance += Number(amount);

localStorage.setItem("users", JSON.stringify(users));

alert("Money added");
}

function createAdmin(){

const users =
JSON.parse(localStorage.getItem("users") || "{}");

users["admin"] = {
password: ADMIN_KEY,
balance:999999,
admin:true
};

localStorage.setItem("users", JSON.stringify(users));
}

createAdmin();

</script>

</body>
</html>
