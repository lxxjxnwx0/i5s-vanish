<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>i5s Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

.hidden{
display:none !important;
}

/* HEADER */

header{
width:100%;
height:78px;
border-bottom:1px solid #111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
background:#000;
}

.logo{
font-size:58px;
font-weight:900;
color:#00ff99;
letter-spacing:-3px;
}

.top-right{
display:flex;
align-items:center;
gap:12px;
}

.balance-box{
padding:12px 18px;
border-radius:14px;
background:#0b0b0b;
border:1px solid #1b1b1b;
color:#00ff99;
font-size:16px;
font-weight:700;
}

.top-btn{
height:46px;
padding:0 18px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:0.2s;
}

.topup-btn{
background:#00ff99;
color:#000;
}

.logout-btn{
background:#151515;
color:white;
}

.top-btn:hover{
transform:translateY(-2px);
}

/* AUTH */

.auth-page{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.auth-box{
width:420px;
background:#090909;
border:1px solid #171717;
border-radius:28px;
padding:35px;
}

.auth-logo{
font-size:85px;
font-weight:900;
text-align:center;
color:#00ff99;
letter-spacing:-4px;
margin-bottom:25px;
}

.input{
width:100%;
height:58px;
border-radius:16px;
border:1px solid #1b1b1b;
background:#0d0d0d;
padding-left:18px;
color:white;
font-size:16px;
outline:none;
margin-bottom:14px;
}

.input:focus{
border-color:#00ff99;
}

.auth-btn{
width:100%;
height:58px;
border:none;
border-radius:16px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:900;
cursor:pointer;
transition:0.2s;
}

.auth-btn:hover{
transform:translateY(-2px);
}

.switch-text{
margin-top:16px;
text-align:center;
font-size:14px;
color:#888;
cursor:pointer;
}

.switch-text span{
color:#00ff99;
font-weight:700;
}

/* PANEL */

.panel{
padding:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
margin-top:10px;
}

.card{
height:240px;
border-radius:28px;
padding:28px;
position:relative;
background:linear-gradient(180deg,#080808,#050505);
border:2px solid #00ff99;
overflow:hidden;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 30px rgba(0,255,153,0.15);
}

.card-title{
font-size:58px;
font-weight:900;
letter-spacing:-3px;
}

.card-price{
position:absolute;
top:28px;
right:28px;
font-size:48px;
font-weight:900;
color:#00ff99;
}

.purchase-btn{
position:absolute;
left:24px;
right:24px;
bottom:24px;
height:58px;
border:none;
border-radius:18px;
background:#00ff99;
font-size:20px;
font-weight:900;
cursor:pointer;
transition:0.2s;
}

.purchase-btn:hover{
transform:scale(1.02);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
width:420px;
background:#0a0a0a;
border:1px solid #1c1c1c;
border-radius:26px;
padding:30px;
}

.popup-title{
font-size:32px;
font-weight:900;
margin-bottom:20px;
}

/* ADMIN */

.admin-panel{
margin-top:40px;
padding:25px;
background:#080808;
border:1px solid #1a1a1a;
border-radius:26px;
}

.admin-title{
font-size:28px;
font-weight:900;
margin-bottom:20px;
color:#00ff99;
}

.request-list{
margin-top:20px;
}

.request-item{
background:#111;
padding:14px;
border-radius:14px;
margin-bottom:12px;
display:flex;
align-items:center;
justify-content:space-between;
}

.small-btn{
padding:10px 16px;
border:none;
border-radius:12px;
background:#00ff99;
font-weight:800;
cursor:pointer;
}

@media(max-width:1000px){

.cards{
grid-template-columns:1fr;
}

.card{
height:220px;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="authPage" class="auth-page">

<div class="auth-box">

<div class="auth-logo">i5s</div>

<!-- LOGIN -->

<div id="loginBox">

<input id="loginUser" class="input" placeholder="Username">

<input id="loginPass" type="password" class="input" placeholder="Password">

<button class="auth-btn" onclick="login()">
Login
</button>

<div class="switch-text">
Don't have an account?
<span onclick="showRegister()">Create Account</span>
</div>

</div>

<!-- REGISTER -->

<div id="registerBox" class="hidden">

<input id="registerUser" class="input" placeholder="Create Username">

<input id="registerPass" type="password" class="input" placeholder="Create Password">

<button class="auth-btn" onclick="register()">
Create Account
</button>

<div class="switch-text">
Already have an account?
<span onclick="showLogin()">Login</span>
</div>

</div>

</div>

</div>

<!-- PANEL -->

<div id="panelPage" class="hidden">

<header>

<div class="logo">i5s</div>

<div class="top-right">

<div class="balance-box">
Balance: $<span id="balance">0</span>
</div>

<button class="top-btn topup-btn" onclick="openTopup()">
Request Topup
</button>

<button class="top-btn logout-btn" onclick="logout()">
Logout
</button>

</div>

</header>

<div class="panel">

<div class="cards">

<div class="card">

<div class="card-title">1d</div>

<div class="card-price">$35</div>

<button class="purchase-btn" onclick="buy(35)">
Purchase
</button>

</div>

<div class="card">

<div class="card-title">3d</div>

<div class="card-price">$20</div>

<button class="purchase-btn" onclick="buy(20)">
Purchase
</button>

</div>

<div class="card">

<div class="card-title">5d</div>

<div class="card-price">$15</div>

<button class="purchase-btn" onclick="buy(15)">
Purchase
</button>

</div>

</div>

<!-- ADMIN -->

<div id="adminPanel" class="admin-panel hidden">

<div class="admin-title">
ADMIN PANEL
</div>

<input id="targetUser" class="input" placeholder="Target Username">

<input id="moneyAmount" class="input" placeholder="Amount">

<button class="auth-btn" onclick="adminAddMoney()">
Add Balance
</button>

<div class="request-list" id="requestList"></div>

</div>

</div>

</div>

<!-- TOPUP POPUP -->

<div class="popup" id="topupPopup">

<div class="popup-box">

<div class="popup-title">
Request Topup
</div>

<input id="topupAmount" class="input" placeholder="Enter Amount">

<button class="auth-btn" onclick="submitRequest()">
Send Request
</button>

</div>

</div>

<script>

const ADMIN_KEY = "F1AX65DvCA45X";

let currentUser = null;

/* CREATE ADMIN */

function createAdmin(){

const users =
JSON.parse(localStorage.getItem("users") || "{}");

if(!users["admin"]){

users["admin"] = {
password: ADMIN_KEY,
balance: 999999,
admin: true
};

localStorage.setItem("users", JSON.stringify(users));

}

}

createAdmin();

/* SWITCH */

function showRegister(){

document.getElementById("loginBox")
.classList.add("hidden");

document.getElementById("registerBox")
.classList.remove("hidden");

}

function showLogin(){

document.getElementById("registerBox")
.classList.add("hidden");

document.getElementById("loginBox")
.classList.remove("hidden");

}

/* REGISTER */

function register(){

const username =
document.getElementById("registerUser").value;

const password =
document.getElementById("registerPass").value;

if(!username || !password){

alert("Fill all fields");
return;

}

const users =
JSON.parse(localStorage.getItem("users") || "{}");

if(users[username]){

alert("Username already exists");
return;

}

users[username] = {

password: password,
balance: 0,
admin: false

};

localStorage.setItem("users", JSON.stringify(users));

alert("Account created");

showLogin();

}

/* LOGIN */

function login(){

const username =
document.getElementById("loginUser").value;

const password =
document.getElementById("loginPass").value;

const users =
JSON.parse(localStorage.getItem("users") || "{}");

if(!users[username]){

alert("User not found");
return;

}

if(users[username].password !== password){

alert("Wrong password");
return;

}

currentUser = username;

document.getElementById("authPage")
.classList.add("hidden");

document.getElementById("panelPage")
.classList.remove("hidden");

updateUI();

if(users[username].admin){

document.getElementById("adminPanel")
.classList.remove("hidden");

loadRequests();

}

}

/* LOGOUT */

function logout(){

location.reload();

}

/* UPDATE UI */

function updateUI(){

const users =
JSON.parse(localStorage.getItem("users") || "{}");

document.getElementById("balance")
.innerText = users[currentUser].balance;

}

/* BUY */

function buy(price){

const users =
JSON.parse(localStorage.getItem("users") || "{}");

if(users[currentUser].balance < price){

alert("Not enough balance");
return;

}

users[currentUser].balance -= price;

localStorage.setItem("users", JSON.stringify(users));

updateUI();

alert("Purchase successful");

}

/* TOPUP */

function openTopup(){

document.getElementById("topupPopup")
.style.display = "flex";

}

function submitRequest(){

const amount =
document.getElementById("topupAmount").value;

if(!amount){

alert("Enter amount");
return;

}

const requests =
JSON.parse(localStorage.getItem("requests") || "[]");

requests.push({

user: currentUser,
amount: amount

});

localStorage.setItem("requests", JSON.stringify(requests));

document.getElementById("topupPopup")
.style.display = "none";

alert("Topup request sent");

}

/* ADMIN REQUESTS */

function loadRequests(){

const requests =
JSON.parse(localStorage.getItem("requests") || "[]");

const div =
document.getElementById("requestList");

div.innerHTML = "";

requests.forEach((r,index)=>{

div.innerHTML += `

<div class="request-item">

<div>
${r.user} requested $${r.amount}
</div>

<button class="small-btn"
onclick="approveRequest(${index})">

Approve

</button>

</div>

`;

});

}

/* APPROVE */

function approveRequest(index){

const requests =
JSON.parse(localStorage.getItem("requests") || "[]");

const users =
JSON.parse(localStorage.getItem("users") || "{}");

const req = requests[index];

users[req.user].balance += Number(req.amount);

localStorage.setItem("users", JSON.stringify(users));

requests.splice(index,1);

localStorage.setItem("requests", JSON.stringify(requests));

loadRequests();

alert("Balance added");

}

/* ADMIN ADD MONEY */

function adminAddMoney(){

const target =
document.getElementById("targetUser").value;

const amount =
document.getElementById("moneyAmount").value;

const users =
JSON.parse(localStorage.getItem("users") || "{}");

if(!users[target]){

alert("User not found");
return;

}

users[target].balance += Number(amount);

localStorage.setItem("users", JSON.stringify(users));

alert("Money added");

}

</script>

</body>
</html>
